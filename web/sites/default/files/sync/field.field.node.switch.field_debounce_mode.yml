description: "<ul>\r\n<li><b>Fast Flip</b> (flipper buttons, maybe magna-save, immediate close, immediate or very-low-latency open, per-direction debounce, preserve rapid close/open/close micro-flips)</li>\r\n<li><b>Fast Momentary</b> (slingshots, bumpers, stand-ups, optos, immediate close, debounced release, reject repeated same-state chatter)</li>\r\n<li></b>Standard</b> (rollovers, lanes, cabinet buttons,normal debounce both directions)</li>\r\n<li><b>Slow Stable</b> (coin door, service, trough-ish mechanical switches, longer debounce, conservative both directions)</li>\r\n</ul>"
