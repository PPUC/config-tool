id: node.switch.field_debounce_mode
field_name: field_debounce_mode
entity_type: node
bundle: switch
label: 'Debounce Mode'
description: "<p>Select how the configured debounce time is applied for this switch. Choose the mode from gameplay semantics, then tune the milliseconds for the physical switch type.</p>\r\n<ul>\r\n<li><b>Fast Flip</b>: flipper buttons and maybe magna-save. Preserves rapid close/open/close micro-flips with very low latency. Typical debounce: 1-3 ms, or 2-5 ms for leaf flipper switches.</li>\r\n<li><b>Fast Momentary</b>: slingshots, bumpers, stand-up targets, optos, and spinners. Close is immediate, release is debounced, and repeated same-state chatter is suppressed. Typical debounce: 1-2 ms for microswitch spinners, 2-3 ms for microswitch slings/bumpers, 3-8 ms for leaf slings/bumpers.</li>\r\n<li><b>Standard</b>: rollovers, lanes, cabinet buttons, and most drop targets. Requires a stable state before reporting either edge. Typical debounce: 3-5 ms for microswitch rollovers/lanes, 5-10 ms generally, 8-15 ms for leaf standups/drop targets or bouncy old drop target leaf switches.</li>\r\n<li><b>Slow Stable</b>: tilt, slam tilt, coin door, service buttons, trough-ish switches, and drop target bank all-down/reset-position switches. Conservative stable-before-report behavior. Typical debounce: 10-50 ms; use 20-50 ms for tilt/slam tilt.</li>\r\n</ul>\r\n<p>Microswitches usually need lower debounce values because their transitions are sharper. Leaf switches usually need higher values because they can flex, vibrate, or bounce longer.</p>"
required: true
